<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average</title>
</head>
<body>
<script>
    let arr = [50,60,30,57,59];
    let sum = 0;
    let n = arr.length;
    for(let i = 0; i < n; i++) {
        sum = sum + arr[i];
    }
    let m = sum / arr.length;
    if (m >= 60){
        console.log("First division marks");
    }
    else if(m < 60 && m >= 40) {
        console.log("Second division marks");
    }
    else if(m < 40 && m >= 33) {
        console.log("Third division marks");
    }
    else{
        console.log("Fail");
    }
</script>
</body>
</html>
